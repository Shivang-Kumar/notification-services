server:
 port: 9258


spring:
  ai:
   vertex:
    ai:
     gemini:
      project-id: notification-api-492516
      location: us-central1

  profiles:
    active: prod
  thymeleaf:
    enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db?-c%20timezone=Asia/Kolkata
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service-group
      key-deserializer:  org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.practice.microservices.notification_service.models.NotificationDto
      enable-auto-commit: false

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
       spring.json.add.type.headers: false
    listener:
       ack-mode: manual

 